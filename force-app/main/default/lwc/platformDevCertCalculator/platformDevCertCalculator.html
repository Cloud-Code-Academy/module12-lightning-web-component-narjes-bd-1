<template>
    <!-- Process-->
     <div>
        <lightning-button class="slds-m-left_x-small"></lightning-button>

     </div>
    <lightning-card  title="PD1 Calculator">
        <lightning-button label="Calculate" title ="Calculate" slot="actions" onclick={calculateScore}></lightning-button>
        <!--Input information-->
        <div class="slds-p-horizontal_small">
        <lightning-input 
        type="number" 
        name="devFundamentals" 
        label="Developer Fundamental: 23%"
        value={devFundamentalScore}
        onchange={handleChange}
        ></lightning-input>

        <lightning-input 
        type="number" 
        name="processAuto" 
        label="Process Automation: 30%"
        value={processAutomationScore}
        onchange={handleChange}
        ></lightning-input>

        <lightning-input 
        type="number" 
        name="userInterface" 
        label="User Interface: 25%"
        value={userInterfaceScore}
        onchange={handleChange}
        ></lightning-input>

        <lightning-input 
        type="number" 
        name="testDebugDeploy" 
        label="Testing, Debugging, and Deployment: 22%"
        value={testingScore}
        onchange={handleChange}
        ></lightning-input>

        </div>
         <!--Display Result-->
        <div slot="footer">
            <h1 class="resultText">Certification Result</h1>
            <p>Certification Score: <span class="scoreText">{certificationScore}%</span></p>
            <div>
                <h1 class="slds-text-heading_large">Previous Attempt</h1>
            <lightning-tabset>
                <div for:each={attemptHistory} for:item="attempt" key={attempt.Id}>
                    
                        <lightning-tab label={attempt.Id}>
                            <c-score-information
                                score={attempt.Score}
                                attempt-id={attempt.Id}
                                number-of-questions={numberOfQuestions}
                                ondeleteattempt={deleteAttemptHandler}>
                            </c-score-information>
                        </lightning-tab>
                    
                </div>
            </lightning-tabset>
            </div>
            <template lwc:if={showresources}>
                <ul class="resourceList">
                    <li>
                        Resources
                    </li>
                    <li>
                        <a href="test1"> PD1 Exam Guide </a>
                    </li>
                    <li>
                        <a href="test2"> Focus On Force </a>
                    </li>
                    <li>
                        <a href="test3"> SF Mentor</a>
                    </li>
                </ul>

            </template>
            <template lwc:elseif={showGoodJob}>
                <p>You are ready for your first Developer Job.</p>
            </template>
            <template lwc:else>
                <p>press calculate to see your score!</p>
            </template>
            
        </div>
    </lightning-card>
   
</template>
